<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="k3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#F3E6B8"/>
      <stop offset="45%"  stop-color="#C9A961"/>
      <stop offset="100%" stop-color="#8B6220"/>
    </linearGradient>
    <radialGradient id="k3disc" cx="40%" cy="35%" r="70%">
      <stop offset="0%"   stop-color="#2A2A2A"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </radialGradient>
    <radialGradient id="k3glow" cx="50%" cy="50%" r="48%">
      <stop offset="0%"  stop-color="#C9A961" stop-opacity="0.3"/>
      <stop offset="80%" stop-color="#C9A961" stop-opacity="0"/>
    </radialGradient>
    <filter id="k3soft"><feGaussianBlur stdDeviation="0.4"/></filter>
  </defs>
  <rect width="400" height="400" fill="#0F0F0F"/>
  <circle cx="200" cy="200" r="175" fill="url(#k3glow)"/>
  <!-- Charcoal / obsidian disc -->
  <circle cx="200" cy="200" r="140" fill="url(#k3disc)" stroke="#3A3A3A" stroke-width="1.5"/>
  <!-- Kintsugi veins: irregular gold seams radiating through the disc,
       varying in width to suggest repair lacquer. -->
  <g fill="none" stroke="url(#k3)" stroke-linecap="round" stroke-linejoin="round" filter="url(#k3soft)">
    <path d="M 90 140 L 160 175 L 200 160 L 235 190 L 290 170" stroke-width="3.5"/>
    <path d="M 160 175 L 155 230 L 185 275 L 220 310"         stroke-width="3"/>
    <path d="M 200 160 L 205 220 L 230 245"                    stroke-width="2.2"/>
    <path d="M 235 190 L 265 225 L 305 245"                    stroke-width="2.5"/>
    <path d="M 95 250 L 150 260 L 185 275"                     stroke-width="2"/>
    <path d="M 220 310 L 260 320 L 310 295"                    stroke-width="1.8"/>
    <path d="M 155 230 L 110 265"                               stroke-width="1.5"/>
    <!-- Fine branches -->
    <path d="M 205 220 L 180 200"                               stroke-width="1.2" opacity="0.85"/>
    <path d="M 265 225 L 275 200"                               stroke-width="1.2" opacity="0.85"/>
    <path d="M 260 320 L 250 340"                               stroke-width="1.0" opacity="0.8"/>
  </g>
  <!-- Wordmark under disc -->
  <text x="200" y="378" text-anchor="middle"
        font-family="Playfair Display, Georgia, serif"
        font-size="32" font-weight="700" fill="#FAFAF8">Aiki</text>
</svg>

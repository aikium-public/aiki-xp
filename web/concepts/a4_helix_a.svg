<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="h4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#D4C5A0"/>
      <stop offset="50%"  stop-color="#C9A961"/>
      <stop offset="100%" stop-color="#A67C2B"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="#0F0F0F"/>
  <!-- Helix as capital "A": two diagonal legs meet at apex; cross-ties are
       the α-helix ribbon rungs. -->
  <g fill="none" stroke="url(#h4)" stroke-linecap="round">
    <!-- Left leg of A as a 3D spiral projection -->
    <path d="M 110 320
             Q 130 260, 155 200
             Q 170 160, 180 120
             Q 188 90, 195 70"
          stroke-width="8"/>
    <!-- Right leg of A -->
    <path d="M 290 320
             Q 270 260, 245 200
             Q 230 160, 220 120
             Q 212 90, 205 70"
          stroke-width="8"/>
    <!-- Helix rungs (shortened near apex, longer at base, emulating helix twist) -->
    <line x1="138" y1="275" x2="262" y2="275" stroke-width="3" opacity="0.85"/>
    <line x1="148" y1="240" x2="252" y2="240" stroke-width="3" opacity="0.8"/>
    <line x1="158" y1="210" x2="242" y2="210" stroke-width="3" opacity="0.75"/>
    <line x1="168" y1="180" x2="232" y2="180" stroke-width="3" opacity="0.7"/>
    <line x1="176" y1="150" x2="224" y2="150" stroke-width="3" opacity="0.65"/>
    <line x1="184" y1="120" x2="216" y2="120" stroke-width="3" opacity="0.6"/>
  </g>
  <!-- The remaining "iki" -->
  <text x="250" y="225" text-anchor="start"
        font-family="Playfair Display, Georgia, serif"
        font-size="92" font-weight="700" fill="#FAFAF8"
        letter-spacing="-0.02em">iki</text>
  <text x="200" y="370" text-anchor="middle"
        font-family="Inter, sans-serif" font-size="11"
        fill="#D4C5A0" letter-spacing="0.32em"
        text-transform="uppercase">AIKIUM · PROTEIN AI SUITE</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="c1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#D4C5A0"/>
      <stop offset="100%" stop-color="#A67C2B"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="#0F0F0F"/>
  <!-- Terminal-window chrome at top: three dots (mac-style) -->
  <g transform="translate(60, 80)">
    <rect width="280" height="200" rx="8" fill="#1A1A1A" stroke="#3A3A3A"/>
    <circle cx="18" cy="18" r="5" fill="#3A3A3A"/>
    <circle cx="36" cy="18" r="5" fill="#3A3A3A"/>
    <circle cx="54" cy="18" r="5" fill="#3A3A3A"/>
    <!-- The CLI mark: <Aiki/> -->
    <text x="140" y="115" text-anchor="middle"
          font-family="JetBrains Mono, monospace"
          font-size="36" font-weight="600">
      <tspan fill="url(#c1)">&lt;</tspan><tspan fill="#FAFAF8">Aiki</tspan><tspan fill="url(#c1)">/&gt;</tspan>
    </text>
    <!-- Prompt line below -->
    <text x="28" y="170" font-family="JetBrains Mono, monospace"
          font-size="12" fill="#6A6A6A">$ aiki predict --tier D</text>
    <!-- Blinking cursor -->
    <rect x="200" y="160" width="8" height="14" fill="#C9A961">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>
  <!-- Wordmark below terminal -->
  <text x="200" y="320" text-anchor="middle"
        font-family="Inter, sans-serif" font-size="14"
        fill="#D4C5A0" letter-spacing="0.3em"
        text-transform="uppercase">AIKIUM · PROTEIN AI SUITE</text>
</svg>

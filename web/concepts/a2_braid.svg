<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#D4C5A0"/>
      <stop offset="50%"  stop-color="#C9A961"/>
      <stop offset="100%" stop-color="#A67C2B"/>
    </linearGradient>
    <radialGradient id="g2glow" cx="50%" cy="60%" r="55%">
      <stop offset="0%"  stop-color="#C9A961" stop-opacity="0.28"/>
      <stop offset="75%" stop-color="#C9A961" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="400" fill="#0F0F0F"/>
  <rect width="400" height="400" fill="url(#g2glow)"/>
  <!-- Three filaments twisting up; sinusoidal phases offset by 120 deg. -->
  <g fill="none" stroke-linecap="round" stroke-width="5">
    <path d="M 140 330
             C 180 280, 220 250, 170 200
             C 120 150, 200 110, 200 60"
          stroke="url(#g2)" opacity="0.95"/>
    <path d="M 200 330
             C 240 280, 180 250, 230 200
             C 280 150, 200 110, 200 60"
          stroke="url(#g2)" opacity="0.75"/>
    <path d="M 260 330
             C 220 280, 240 250, 200 200
             C 160 150, 200 110, 200 60"
          stroke="url(#g2)" opacity="0.55"/>
  </g>
  <!-- Three nodes at the base, one at the top -->
  <g fill="#C9A961">
    <circle cx="140" cy="332" r="4"/>
    <circle cx="200" cy="332" r="4"/>
    <circle cx="260" cy="332" r="4"/>
    <circle cx="200" cy="58"  r="6"/>
  </g>
  <!-- Wordmark below -->
  <text x="200" y="388" text-anchor="middle"
        font-family="Playfair Display, Georgia, serif"
        font-size="36" font-weight="700" fill="#FAFAF8">Aiki</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="n4glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#C9A961" stop-opacity="1"/>
      <stop offset="70%"  stop-color="#C9A961" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="n4bg" cx="50%" cy="50%" r="65%">
      <stop offset="0%"  stop-color="#C9A961" stop-opacity="0.12"/>
      <stop offset="90%" stop-color="#C9A961" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="400" fill="#0F0F0F"/>
  <rect width="400" height="400" fill="url(#n4bg)"/>
  <!-- Edges first, so nodes sit on top -->
  <g stroke="#C9A961" stroke-opacity="0.55" stroke-width="1.2" fill="none">
    <line x1="120" y1="95"  x2="200" y2="140"/>
    <line x1="200" y1="140" x2="290" y2="108"/>
    <line x1="200" y1="140" x2="155" y2="220"/>
    <line x1="290" y1="108" x2="310" y2="200"/>
    <line x1="155" y1="220" x2="240" y2="250"/>
    <line x1="310" y1="200" x2="240" y2="250"/>
    <line x1="155" y1="220" x2="110" y2="310"/>
    <line x1="240" y1="250" x2="280" y2="320"/>
  </g>
  <!-- Nodes with soft glow -->
  <g>
    <!-- Each node: outer glow + inner bright disc -->
    <g transform="translate(120,95)"><circle r="14" fill="url(#n4glow)"/><circle r="4.5" fill="#FAFAF8"/></g>
    <g transform="translate(200,140)"><circle r="18" fill="url(#n4glow)"/><circle r="5.5" fill="#FAFAF8"/></g>
    <g transform="translate(290,108)"><circle r="14" fill="url(#n4glow)"/><circle r="4.5" fill="#FAFAF8"/></g>
    <g transform="translate(155,220)"><circle r="14" fill="url(#n4glow)"/><circle r="4.5" fill="#FAFAF8"/></g>
    <g transform="translate(310,200)"><circle r="14" fill="url(#n4glow)"/><circle r="4.5" fill="#FAFAF8"/></g>
    <g transform="translate(240,250)"><circle r="14" fill="url(#n4glow)"/><circle r="4.5" fill="#FAFAF8"/></g>
    <g transform="translate(110,310)"><circle r="12" fill="url(#n4glow)"/><circle r="3.5" fill="#FAFAF8"/></g>
    <g transform="translate(280,320)"><circle r="12" fill="url(#n4glow)"/><circle r="3.5" fill="#FAFAF8"/></g>
  </g>
  <!-- Wordmark -->
  <text x="200" y="378" text-anchor="middle"
        font-family="Playfair Display, Georgia, serif"
        font-size="32" font-weight="700" fill="#FAFAF8">Aiki</text>
</svg>

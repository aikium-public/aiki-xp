<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="t5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#D4C5A0"/>
      <stop offset="50%"  stop-color="#C9A961"/>
      <stop offset="100%" stop-color="#A67C2B"/>
    </linearGradient>
    <radialGradient id="t5glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#C9A961" stop-opacity="0.25"/>
      <stop offset="75%" stop-color="#C9A961" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="400" fill="#0F0F0F"/>
  <rect x="50" y="50" width="300" height="300" fill="url(#t5glow)"/>
  <!-- Regular hexagon centered at (200, 200), radius 140 -->
  <polygon points="200,60 321.2,130 321.2,270 200,340 78.8,270 78.8,130"
           fill="none" stroke="url(#t5)" stroke-width="5"
           stroke-linejoin="round"/>
  <!-- Inner thin line offset hex for depth -->
  <polygon points="200,80 307.8,142 307.8,258 200,320 92.2,258 92.2,142"
           fill="none" stroke="#C9A961" stroke-width="1.2" opacity="0.35"/>
  <!-- Tile number -->
  <text x="108" y="130" font-family="JetBrains Mono, monospace"
        font-size="16" fill="#D4C5A0" font-weight="500">01</text>
  <!-- Atomic-weight equivalent: model count -->
  <text x="292" y="130" text-anchor="end"
        font-family="JetBrains Mono, monospace"
        font-size="14" fill="#D4C5A0" opacity="0.75">5-mod</text>
  <!-- Main symbol -->
  <text x="200" y="212" text-anchor="middle"
        font-family="Playfair Display, Georgia, serif"
        font-size="74" font-weight="800" fill="#FAFAF8">Aiki</text>
  <!-- Suite subtitle -->
  <text x="200" y="248" text-anchor="middle"
        font-family="Inter, sans-serif" font-size="13"
        fill="#D4C5A0" letter-spacing="0.28em"
        text-transform="uppercase">suite</text>
  <!-- Mass-like element at bottom -->
  <text x="200" y="290" text-anchor="middle"
        font-family="JetBrains Mono, monospace"
        font-size="11" fill="#6A6A6A">protein · DNA · genome</text>
</svg>
